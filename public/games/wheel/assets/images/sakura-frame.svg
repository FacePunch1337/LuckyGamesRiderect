      <ellipse cx="-13" cy="-4" rx="8" ry="17" fill="url(#petal)" transform="rotate(288)"/>
      <circle r="5" fill="#ffd966"/>
      <circle r="2" fill="#9b4a24"/>
    </g>
    <g id="leafPair">
      <ellipse cx="-8" cy="0" rx="5" ry="16" fill="url(#leaf)" transform="rotate(-35)"/>
      <ellipse cx="8" cy="0" rx="5" ry="16" fill="url(#leaf)" transform="rotate(35)"/>
    </g>
    <g id="petals">
