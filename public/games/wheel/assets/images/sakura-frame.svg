    <g transform="translate(196 258) rotate(-18) scale(0.72)"><use href="#smallBlossom"/></g>
    <g transform="translate(292 282) rotate(18) scale(0.86)"><use href="#blossom"/></g>

    <g transform="translate(88 164) rotate(-18)"><use href="#leafPair"/></g>
    <g transform="translate(174 126) rotate(14)"><use href="#leafPair"/></g>
    <g transform="translate(274 92) rotate(-12)"><use href="#leafPair"/></g>
    <g transform="translate(384 44) rotate(20)"><use href="#leafPair"/></g>
    <g transform="translate(266 244) rotate(-18)"><use href="#leafPair"/></g>
  </g>

  <g transform="translate(1600 0) scale(-1 1)" opacity="0.98">
    <path d="M-24 148 C96 96 194 66 322 40 C448 14 550 2 660 -34" fill="none" stroke="url(#bark)" stroke-width="19" stroke-linecap="round"/>
    <path d="M-12 140 C108 94 204 66 326 45 C444 24 544 12 648 -20" fill="none" stroke="url(#barkLight)" stroke-width="6" stroke-linecap="round"/>
    <path d="M20 190 C116 198 214 180 330 132 C430 92 518 72 616 62" fill="none" stroke="url(#bark)" stroke-width="13" stroke-linecap="round"/>
    <path d="M42 254 C126 226 208 238 306 280" fill="none" stroke="url(#bark)" stroke-width="12" stroke-linecap="round"/>
    <path d="M102 98 C170 128 248 122 338 84" fill="none" stroke="url(#bark)" stroke-width="9" stroke-linecap="round"/>
    <path d="M238 44 C316 74 390 70 476 36" fill="none" stroke="url(#bark)" stroke-width="8" stroke-linecap="round"/>
    <path d="M360 24 C418 44 476 40 548 16" fill="none" stroke="url(#bark)" stroke-width="6" stroke-linecap="round"/>

    <g transform="translate(54 176) rotate(-18) scale(1.06)"><use href="#blossom"/></g>
    <g transform="translate(124 142) rotate(10) scale(0.9)"><use href="#blossom"/></g>
    <g transform="translate(214 118) rotate(-12) scale(1.12)"><use href="#blossom"/></g>
    <g transform="translate(312 76) rotate(16) scale(0.82)"><use href="#blossom"/></g>
    <g transform="translate(428 36) rotate(-18) scale(0.68)"><use href="#smallBlossom"/></g>
    <g transform="translate(520 66) rotate(10) scale(0.78)"><use href="#smallBlossom"/></g>
    <g transform="translate(196 258) rotate(-18) scale(0.72)"><use href="#smallBlossom"/></g>
    <g transform="translate(292 282) rotate(18) scale(0.86)"><use href="#blossom"/></g>

    <g transform="translate(88 164) rotate(-18)"><use href="#leafPair"/></g>
    <g transform="translate(174 126) rotate(14)"><use href="#leafPair"/></g>
    <g transform="translate(274 92) rotate(-12)"><use href="#leafPair"/></g>
    <g transform="translate(384 44) rotate(20)"><use href="#leafPair"/></g>
    <g transform="translate(266 244) rotate(-18)"><use href="#leafPair"/></g>
  </g>
</svg>
