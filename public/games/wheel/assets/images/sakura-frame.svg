      <ellipse cx="44" cy="22" rx="6" ry="3.5" fill="#ff92c1" transform="rotate(32)"/>
      <ellipse cx="82" cy="-12" rx="7" ry="4" fill="#ffc0de" transform="rotate(-6)"/>
