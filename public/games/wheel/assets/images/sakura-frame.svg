<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMin meet">
  <defs>
    <radialGradient id="petal" cx="38%" cy="28%" r="78%">
      <stop offset="0" stop-color="#fffaff"/>
      <stop offset="0.42" stop-color="#ffd2e8"/>
      <stop offset="0.78" stop-color="#f78bbb"/>
      <stop offset="1" stop-color="#d94f91"/>
    </radialGradient>
    <linearGradient id="bark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9b5737"/>
      <stop offset="0.52" stop-color="#4b1e25"/>
      <stop offset="1" stop-color="#16070f"/>
    </linearGradient>
    <linearGradient id="barkLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d99a63" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#5b2225" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9f68f"/>
      <stop offset="0.66" stop-color="#73ba55"/>
      <stop offset="1" stop-color="#315f3c"/>
    </linearGradient>
    <filter id="flowerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#ff9cca" flood-opacity="0.44"/>
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#1b0613" flood-opacity="0.28"/>
    </filter>
    <g id="blossom" filter="url(#flowerGlow)">
      <ellipse cx="0" cy="-15" rx="10" ry="18" fill="url(#petal)"/>
      <ellipse cx="14" cy="-5" rx="10" ry="18" fill="url(#petal)" transform="rotate(72)"/>
      <ellipse cx="9" cy="12" rx="10" ry="18" fill="url(#petal)" transform="rotate(144)"/>
      <ellipse cx="-9" cy="12" rx="10" ry="18" fill="url(#petal)" transform="rotate(216)"/>
      <ellipse cx="-14" cy="-5" rx="10" ry="18" fill="url(#petal)" transform="rotate(288)"/>
      <circle r="5.5" fill="#ffd64d"/>
      <circle r="2.2" fill="#984327"/>
    </g>
    <g id="smallBlossom" filter="url(#flowerGlow)">
      <ellipse cx="0" cy="-10" rx="7" ry="12" fill="url(#petal)"/>
      <ellipse cx="9" cy="-3" rx="7" ry="12" fill="url(#petal)" transform="rotate(72)"/>
      <ellipse cx="6" cy="8" rx="7" ry="12" fill="url(#petal)" transform="rotate(144)"/>
      <ellipse cx="-6" cy="8" rx="7" ry="12" fill="url(#petal)" transform="rotate(216)"/>
      <ellipse cx="-9" cy="-3" rx="7" ry="12" fill="url(#petal)" transform="rotate(288)"/>
      <circle r="3.8" fill="#ffd64d"/>
    </g>
    <g id="leafPair">
      <ellipse cx="-8" cy="0" rx="5.5" ry="16" fill="url(#leaf)" transform="rotate(-34)"/>
      <ellipse cx="8" cy="0" rx="5.5" ry="16" fill="url(#leaf)" transform="rotate(34)"/>
    </g>
  </defs>

  <g opacity="0.98">
    <path d="M-24 148 C96 96 194 66 322 40 C448 14 550 2 660 -34" fill="none" stroke="url(#bark)" stroke-width="19" stroke-linecap="round"/>
    <path d="M-12 140 C108 94 204 66 326 45 C444 24 544 12 648 -20" fill="none" stroke="url(#barkLight)" stroke-width="6" stroke-linecap="round"/>
    <path d="M20 190 C116 198 214 180 330 132 C430 92 518 72 616 62" fill="none" stroke="url(#bark)" stroke-width="13" stroke-linecap="round"/>
    <path d="M42 254 C126 226 208 238 306 280" fill="none" stroke="url(#bark)" stroke-width="12" stroke-linecap="round"/>
    <path d="M102 98 C170 128 248 122 338 84" fill="none" stroke="url(#bark)" stroke-width="9" stroke-linecap="round"/>
    <path d="M238 44 C316 74 390 70 476 36" fill="none" stroke="url(#bark)" stroke-width="8" stroke-linecap="round"/>
    <path d="M360 24 C418 44 476 40 548 16" fill="none" stroke="url(#bark)" stroke-width="6" stroke-linecap="round"/>

    <g transform="translate(54 176) rotate(-18) scale(1.06)"><use href="#blossom"/></g>
    <g transform="translate(124 142) rotate(10) scale(0.9)"><use href="#blossom"/></g>
    <g transform="translate(214 118) rotate(-12) scale(1.12)"><use href="#blossom"/></g>
    <g transform="translate(312 76) rotate(16) scale(0.82)"><use href="#blossom"/></g>
    <g transform="translate(428 36) rotate(-18) scale(0.68)"><use href="#smallBlossom"/></g>
