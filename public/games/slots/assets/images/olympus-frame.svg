    <rect x="0" y="772" width="1600" height="45" fill="#cdb17a"/>
    <rect x="0" y="817" width="1600" height="83" fill="#a8844b"/>
    <path d="M0 732 C180 704 356 734 526 706 C708 676 862 730 1046 700 C1228 670 1402 708 1600 682 V900 H0 Z" fill="#fff6df" opacity="0.22"/>
    <path d="M0 770 H1600 M0 817 H1600" stroke="#77592d" stroke-width="4" opacity="0.24"/>
