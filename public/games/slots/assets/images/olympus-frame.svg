      <use href="#column" x="0"/>
      <use href="#column" x="134"/>
      <use href="#column" x="268"/>
    </g>
    <g transform="translate(1182 354)">
      <use href="#column" x="0"/>
      <use href="#column" x="134"/>
      <use href="#column" x="268"/>
    </g>
  </g>

  <g transform="translate(800 528)" filter="url(#softShadow)" opacity="0.94">
    <rect x="-410" y="0" width="820" height="36" rx="5" fill="#fff3d5"/>
    <rect x="-455" y="34" width="910" height="40" rx="5" fill="#d0b47c"/>
