<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="marble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/>
      <stop offset="0.28" stop-color="#f2e7cb"/>
      <stop offset="0.64" stop-color="#d2be8c"/>
      <stop offset="1" stop-color="#a98b55"/>
    </linearGradient>
    <linearGradient id="marbleDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff9e8"/>
      <stop offset="0.52" stop-color="#dbc698"/>
      <stop offset="1" stop-color="#92743f"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="35%" r="65%">
      <stop offset="0" stop-color="#fff7b8" stop-opacity="0.92"/>
      <stop offset="0.42" stop-color="#ffd66a" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#fff2a2" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#5d4219" flood-opacity="0.27"/>
    </filter>
    <g id="flute">
      <path d="M0 0 C10 58 10 214 0 316" fill="none" stroke="#a88d58" stroke-width="4" opacity="0.44"/>
      <path d="M9 0 C17 62 17 210 9 316" fill="none" stroke="#fff7df" stroke-width="2" opacity="0.42"/>
    </g>
    <g id="column">
      <rect x="-58" y="-20" width="116" height="24" rx="5" fill="url(#marbleDark)"/>
      <rect x="-48" y="2" width="96" height="24" rx="5" fill="#fff5d9"/>
      <path d="M-58 -20 C-34 -40 34 -40 58 -20" fill="#e7d2a0"/>
      <path d="M-46 -18 C-25 -32 25 -32 46 -18" fill="#fff6df" opacity="0.72"/>
      <rect x="-35" y="24" width="70" height="322" rx="10" fill="url(#marble)"/>
      <use href="#flute" x="-22" y="32"/>
      <use href="#flute" x="-6" y="32"/>
      <use href="#flute" x="10" y="32"/>
      <use href="#flute" x="25" y="32"/>
      <path d="M-23 34 C-12 126 -14 252 -24 338" fill="none" stroke="#fff8e1" stroke-width="4" opacity="0.28"/>
      <rect x="-44" y="346" width="88" height="26" rx="5" fill="#fff2d2"/>
      <rect x="-62" y="370" width="124" height="30" rx="5" fill="url(#marbleDark)"/>
      <rect x="-72" y="398" width="144" height="22" rx="4" fill="#c9ad78"/>
    </g>
    <g id="cloud">
      <ellipse cx="-76" cy="38" rx="72" ry="44" fill="#ffffff" opacity="0.82"/>
      <ellipse cx="0" cy="20" rx="88" ry="58" fill="#ffffff" opacity="0.9"/>
      <ellipse cx="84" cy="42" rx="78" ry="42" fill="#ffffff" opacity="0.8"/>
      <ellipse cx="8" cy="62" rx="162" ry="35" fill="#ffffff" opacity="0.72"/>
    </g>
  </defs>

  <rect width="1600" height="900" fill="url(#goldGlow)" opacity="0.55"/>
  <g opacity="0.64">
    <use href="#cloud" x="220" y="142" transform="scale(0.86)"/>
    <use href="#cloud" x="1370" y="158" transform="scale(0.78)"/>
    <use href="#cloud" x="810" y="96" transform="scale(0.56)"/>
    <use href="#cloud" x="1130" y="285" transform="scale(0.54)"/>
  </g>

  <g filter="url(#softShadow)" opacity="0.98">
